name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🔧 Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: 📦 Install packages
        run: lune run wally-install

      - name: 🏗️ Build ordered-dictionary.rbxm
        run: rojo build default.project.json -o ordered-dictionary-${{ github.ref_name }}.rbxm

      - name: 🚀 Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} --draft --verify-tag --title ${{ github.ref_name }}

      - name: 📤 Upload to Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} ordered-dictionary-${{ github.ref_name }}.rbxm